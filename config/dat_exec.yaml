# ============================================================
# dat_exec.yaml — 数据源 / 缓存 / 分流序列
# 设计：预处理 → 主流程 → resp_ip 反污染
# ============================================================

plugins:
  # ── 数据源 (domain_set / ip_set) ──
  - tag: geoip_private
    type: ip_set
    args:
      files: ["/etc/mosdns/dat/geoip_private.txt"]

  - tag: geoip_cn
    type: ip_set
    args:
      files: ["/etc/mosdns/dat/geoip_cn.txt"]

  - tag: geosite_cn
    type: domain_set
    args:
      files: ["/etc/mosdns/dat/geosite_cn.txt"]

  - tag: geosite_ads_all
    type: domain_set
    args:
      files: ["/etc/mosdns/dat/geosite_category-ads-all.txt"]

  - tag: geosite_gfw
    type: domain_set
    args:
      files: ["/etc/mosdns/dat/geosite_gfw.txt"]

  - tag: geosite_location_not_cn
    type: domain_set
    args:
      files: ["/etc/mosdns/dat/geosite_geolocation-!cn.txt"]

  # ── 双缓存 ──
  - tag: cache_lan
    type: cache
    args:
      size: 8192
      lazy_cache_ttl: 86400

  - tag: cache_wan
    type: cache
    args:
      size: 131072
      lazy_cache_ttl: 86400
      dump_file: ./cache.dump
      dump_interval: 120

  # ── TTL 分级 ──
  - tag: ttl_1h
    type: sequence
    args: [{ exec: ttl 3600 }]

  - tag: ttl_5m
    type: sequence
    args: [{ exec: ttl 300 }]

  # ── 结果处理 ──
  - tag: pre_handle
    type: sequence
    args: [{ exec: $ttl_1h }, { exec: accept }]

  - tag: main_handle
    type: sequence
    args: [{ exec: $ttl_5m }, { exec: accept }]

  - tag: has_resp_pre
    type: sequence
    args: [{ matches: has_resp, exec: goto pre_handle }]

  - tag: has_resp_main
    type: sequence
    args: [{ matches: has_resp, exec: goto main_handle }]

  # ── 国内查询（ECS + 反污染）──
  - tag: query_cn
    type: sequence
    args:
      - exec: $ecs_cn
      - exec: $dns_cn
      - matches: "!resp_ip $geoip_cn"
        exec: drop_resp

  # ── 国外查询（反污染）──
  - tag: query_nocn
    type: sequence
    args:
      - exec: $dns_nocn
      - matches: "resp_ip $geoip_cn"
        exec: drop_resp

  # ── 内网查询 ──
  - tag: query_lan
    type: sequence
    args:
      - exec: $cache_lan
      - matches: has_resp
        exec: return
      - exec: $no_ecs
      - exec: $dns_cn

  # ── 其他情况 ──
  - tag: query_other
    type: sequence
    args:
      - exec: $no_ecs
      - exec: $dns_nocn

  # ── 拒绝处理 ──
  - tag: reject_qtype65
    type: sequence
    args: [{ exec: query_summary reject_qtype65 }, { exec: $reject_3 }]

  - tag: reject_null_domain
    type: sequence
    args: [{ exec: query_summary reject_null_domain }, { exec: $reject_3 }]

  - tag: reject_ad
    type: sequence
    args: [{ exec: query_summary reject_ad }, { exec: $reject_3 }]

  # ── 预处理 ──
  - tag: pre_sequence
    type: sequence
    args:
      - matches: "qtype 65"
        exec: $reject_qtype65
      - matches: "qname keyword::"
        exec: $reject_null_domain
      - matches: "qtype 12"
        exec: $query_other
      - matches: "qtype 255"
        exec: $query_other
      - matches: "ptr_ip $geoip_private"
        exec: $query_lan
      - exec: jump has_resp_pre

  # ── 主流程 ──
  - tag: main_sequence
    type: sequence
    args:
      - matches: "qname $geosite_ads_all"
        exec: $reject_ad
      - exec: $cache_wan
      - exec: jump has_resp_main
      - matches: "qname $geosite_gfw"
        exec: $query_nocn
      - exec: jump has_resp_main
      - matches: "qname $geosite_location_not_cn"
        exec: $query_nocn
      - exec: jump has_resp_main
      - matches: "qname $geosite_cn"
        exec: $query_cn
      - exec: jump has_resp_main
      - exec: $no_ecs
      - exec: $query_nocn
      - exec: jump has_resp_main

  # ── 顶层 ──
  - tag: sequence
    type: sequence
    args:
      - exec: $pre_sequence
      - exec: $main_sequence
