# ============================================================
# mosdns v5 — Docker Compose 标准化部署
# 配置: 复制 .env.example 为 .env 并修改
# ============================================================

services:
  mosdns:
    build:
      context: .
      dockerfile: Dockerfile
    image: mosdns:v${MOSDNS_VERSION:-5.3.4}
    container_name: mosdns
    restart: always
    network_mode: host
    environment:
      - ECS_PRESET=${ECS_PRESET:-}
    volumes:
      - ./config/config.yaml:/etc/mosdns/config.yaml:ro
      - ./config/dat_exec.yaml:/etc/mosdns/dat_exec.yaml:ro
      - ./config/dns.yaml.tpl:/etc/mosdns/dns.yaml.tpl:ro
      - ./rules/dat:/etc/mosdns/dat:ro
      - ./custom:/etc/mosdns/custom:ro
      - ./cache:/etc/mosdns/cache
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "3"
