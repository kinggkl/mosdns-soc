# ============================================================
# mosdns v5 — Docker Compose 部署 v2.2
# 新增：规则自动更新（dat 卷改为读写）+ 时区设置
# ============================================================

services:
  mosdns:
    build:
      context: .
      dockerfile: Dockerfile
    image: mosdns:v5.3.4
    container_name: mosdns
    environment:
      - TZ=Asia/Shanghai
    restart: always
    network_mode: host
    volumes:
      - ./config.yaml:/etc/mosdns/config.yaml:ro
      - ./dat_exec.yaml:/etc/mosdns/dat_exec.yaml:ro
      - ./dns.yaml:/etc/mosdns/dns.yaml:ro
      - ./dat:/etc/mosdns/dat:rw
      - ./cache:/etc/mosdns/cache:rw
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "3"